name = "cps-connect-r2"
main = "r2-worker.js"
compatibility_date = "2024-09-23"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cps-connect-files"

[vars]
# Origines autorisées (séparées par virgule si plusieurs)
ALLOWED_ORIGINS = "https://cps-connect.web.app,https://cps-connect.firebaseapp.com,http://localhost:5173,http://localhost:5174,https://esig-prep-guide.vercel.app"
# Firebase project ID pour vérification JWT
FIREBASE_PROJECT_ID = "esig-prep-guide"
# URL publique du bucket R2 (à renseigner après activation du public access)
R2_PUBLIC_BASE_URL = "https://pub-e3fca1a35c0349beb0d77639ba6d6465.r2.dev"
